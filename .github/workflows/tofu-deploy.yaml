name: Infrastructure Deployment on Self Hosted Kubernetes Cluster

on:
  workflow_dispatch:
  push:
    branches:
      - task/**
      - bug/**
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - closed

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  infrastructure_deploy:
    name: Infrastructure Deployment on Self Hosted Kubernetes Cluster
    uses: necro-cloud/automations/.github/workflows/tofu-deploy.yml@main
    with:
      deployment_name: Kubernetes Infrastructure
      folder_path: infrastructure
      runners: cloud
      pre_plan_script: exit 1
    secrets:
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
      TFVARS: ${{ secrets.TFVARS }}
